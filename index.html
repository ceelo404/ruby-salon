<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Salon - Modern Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7B2CBF;
            --purple-dark: #5A189A;
            --light-gray: #f4f5f7;
            --dark-gray: #1b1b1f;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: #fff;
        }

        /* --- NEW: Translucent Sticky Header --- */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(27, 27, 31, 0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            box-sizing: border-box;
        }

        .site-header .logo {
            max-height: 40px;
        }

        /* --- NEW: Hero Section to center the card --- */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
            box-sizing: border-box;
        }
        
        /* --- NEW: Main Content Card with Image Background --- */
        .content-card {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-image: url('https://raw.githubusercontent.com/ceelo404/ruby-salon/main/last_email_header.png');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            overflow: hidden;
            padding: 60px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            box-sizing: border-box;
        }

        /* Dark overlay to make text readable */
        .content-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Container for content inside the card */
        .card-content {
            position: relative;
            z-index: 2;
        }

        .card-content h1 {
            font-size: 3em;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        
        .card-content p {
            font-size: 1.1em;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .button {
            display: inline-block;
            background-color: var(--purple);
            color: #fff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            margin: 10px;
            transition: all 0.2s ease-in-out;
        }

        .button:hover {
            background-color: var(--purple-dark);
            transform: scale(1.05);
        }
        
        .secondary-button {
            background: rgba(255,255,255,0.1);
        }
        .secondary-button:hover {
             background: rgba(255,255,255,0.2);
        }

        /* Other content below the card */
        .more-info {
             max-width: 900px;
             margin: 40px auto;
             padding: 0 20px;
             color: var(--dark-gray);
        }

        .map-container iframe {
            width: 100%;
            height: 450px;
            border: 0;
            border-radius: 16px;
        }

        footer {
            background-color: var(--dark-gray);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 30px 20px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="https://book.ruby-salon.com/wp-content/uploads/2025/01/white_logo_vert.png" alt="Ruby Salon Logo" class="logo">
        <div>
             <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button secondary-button">Book Now</a>
             <a href="https://venmo.com/u/Brandy-Claussen" class="button">Tip Now</a>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="content-card">
                <div class="card-content">
                    <h1>Style, Perfected.</h1>
                    <p>Located at 114 W Trinity Pl. #10 in Downtown Decatur. Free validated parking for 2 hours is available in the AMLI parking garage.</p>
                    <p><strong>Phone:</strong> <a href="tel:+14043893114" style="color: #fff;">(404) 389-3114</a></p>
                    <div>
                         <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button">Book An Appointment</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="more-info">
             <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3317.031252324909!2d-84.2982293847926!3d33.75949498068593!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88f50765c156f76b%3A0x8c613cfe254a443b!2s114%20W%20Trinity%20Pl%20%2310%2C%20Decatur%2C%20GA%2030030!5e0!3m2!1sen!2sus!4v1659034884214!5m2!1sen!2sus"
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>
    </main>
    
    <footer>
        <p>© 2025 Ruby Salon | 114 W Trinity Pl #10, Decatur, GA 30030</p>
    </footer>

</body>
</html>
