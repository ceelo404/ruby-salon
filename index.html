<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Salon - Modern Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7B2CBF;
            --purple-dark: #5A189A;
            --purple-light: #9D4EDD;
            --light-gray: #f4f5f7;
            --dark-gray: #1b1b1f;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: #fff;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: linear-gradient(90deg, rgba(90, 24, 154, 0.8), rgba(123, 44, 191, 0.8), rgba(157, 78, 221, 0.8));
            backdrop-filter: blur(10px);
            z-index: 100;
            box-sizing: border-box;
        }

        .site-header .logo {
            max-height: 40px;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
            box-sizing: border-box;
        }
        
        .content-card {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-image: url('https://raw.githubusercontent.com/ceelo404/ruby-salon/main/last_email_header.png');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            overflow: hidden;
            padding: 60px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            box-sizing: border-box;
        }

        .content-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .card-content h1 {
            font-size: 3em;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        
        .card-content p {
            font-size: 1.1em;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .button {
            display: inline-block;
            background-color: var(--purple);
            color: #fff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            margin: 10px;
            transition: all 0.2s ease-in-out;
        }

        .button:hover {
            background-color: var(--purple-dark);
            transform: scale(1.05);
        }
        
        .secondary-button {
            background: rgba(255,255,255,0.1);
        }
        .secondary-button:hover {
             background: rgba(255,255,255,0.2);
        }

        .more-info {
             max-width: 900px;
             margin: 40px auto;
             padding: 0 20px;
             color: var(--dark-gray);
        }

        .map-container iframe {
            width: 100%;
            height: 450px;
            border: 0;
            border-radius: 16px;
        }

        footer {
            background-color: var(--dark-gray);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 30px 20px;
        }

        /* --- NEW: Mobile Responsive Styles --- */
        @media (max-width: 768px) {
            .site-header {
                padding: 15px;
            }

            .site-header .logo {
                max-height: 30px;
            }

            /* Hide the buttons in the top bar on mobile */
            .site-header .header-buttons {
                display: none;
            }

            .content-card {
                padding: 40px 25px;
            }

            .card-content h1 {
                font-size: 2.2em;
            }

            .card-content p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="https://book.ruby-salon.com/wp-content/uploads/2025/01/white_logo_vert.png" alt="Ruby Salon Logo" class="logo">
        <div class="header-buttons">
             <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button secondary-button">Book Now</a>
             <a href="https://venmo.com/u/Brandy-Claussen" class="button">Tip Now</a>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="content-card">
                <div class="card-content">
                    <h1>Style, Perfected.</h1>
                    <p>Located at 114 W Trinity Pl. #10 in Downtown Decatur. Free validated parking for 2 hours is available in the AMLI parking garage.</p>
                    <p><strong>Phone:</strong> <a href="tel:+14043893114" style="color: #fff;">(404) 389-3114</a></p>
                    <div>
                         <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button">Book An Appointment</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="more-info">
             <div class="map-container">
                <iframe 
                    src="http://googleusercontent.com/maps/google.com/3"
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>
    </main>
    
    <footer>
        <p>© 2025 Ruby Salon | 114 W Trinity Pl #10, Decatur, GA 30030</p>
    </footer>

</body>
</html>
