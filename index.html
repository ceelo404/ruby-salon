<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Salon - Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .banner-header {
            background-image: url('https://raw.githubusercontent.com/ceelo404/ruby-salon/main/last_email_header.png');
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        /* Increased the width of the logo */
        .banner-header .logo {
            max-width: 600px;
        }
        
        .main-container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .info p {
            line-height: 1.7;
            font-size: 1.1em;
            color: #555;
        }

        a {
            color: #8A3B58;
            font-weight: bold;
        }

        .button-wrapper {
            margin: 30px 0;
        }

        .button {
            display: inline-block;
            background-color: #5D3A9B;
            color: #fff;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px;
            transition: background-color 0.3s, transform 0.2s;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .button:hover {
            background-color: #4C2D80;
            transform: translateY(-2px);
        }

        .map-container {
            width: 100%;
            margin-top: 40px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .map-container iframe {
            width: 100%;
            height: 450px;
            border: 0;
        }

        footer {
            background-color: #343a40;
            color: #f8f9fa;
            text-align: center;
            padding: 30px 20px;
            margin-top: auto;
        }

        footer p {
            margin: 8px 0;
            font-size: 0.9em;
        }
        
        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            margin: 0 15px;
            display: inline-block;
        }
        
        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            transition: fill 0.3s;
        }

        .social-icons a:hover svg {
            fill: #c7c7c7;
        }
    </style>
</head>
<body>

    <header class="banner-header">
        <img src="https://book.ruby-salon.com/wp-content/uploads/2025/01/white_logo_vert.png" alt="Ruby Salon Logo" class="logo">
    </header>

    <div class="main-container">
        <div class="button-wrapper">
            <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button">Book Now</a>
            <a href="https://venmo.com/u/Brandy-Claussen" class="button">Tip Now</a>
        </div>

        <div class="info">
            <p><strong>Located at 114 W Trinity Pl. #10 in Downtown Decatur</strong></p>
            <p>Free validated parking for 2 hours is available in the AMLI parking garage at 122 W Trinity Pl.</p>
            <p>Phone: <a href="tel:+14043893114">(404) 389-3114</a></p>
        </div>

        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3317.031252324909!2d-84.2982293847926!3d33.75949498068593!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88f50765c156f76b%3A0x8c613cfe254a443b!2s114%20W%20Trinity%20Pl%20%2310%2C%20Decatur%2C%20GA%2030030!5e0!3m2!1sen!2sus!4v1659034884214!5m2!1sen!2sus"
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <footer>
        <p>114 W Trinity Pl #10, Decatur, GA 30030</p>
        <p>(404) 389-3114</p>

</body>
</html>
