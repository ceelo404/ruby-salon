<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Salon - Modern Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7B2CBF;
            --purple-dark: #5A189A;
            --purple-light: #9D4EDD;
            --light-gray: #f4f5f7;
            --dark-gray: #1b1b1f;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: #fff;
            /* Add padding to the bottom to prevent content from hiding behind the sticky footer */
            padding-bottom: 60px;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: linear-gradient(90deg, rgba(90, 24, 154, 0.8), rgba(123, 44, 191, 0.8), rgba(157, 78, 221, 0.8));
            backdrop-filter: blur(10px);
            z-index: 100;
            box-sizing: border-box;
        }

        .site-header .logo {
            max-height: 40px;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 120px 20px 40px;
            box-sizing: border-box;
        }
        
        .content-card {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-image: url('https://raw.githubusercontent.com/ceelo404/ruby-salon/main/last_email_header.png');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            overflow: hidden;
            padding: 60px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            box-sizing: border-box;
        }

        .content-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .card-content h1 {
            font-size: 3em;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        
        .card-content p {
            font-size: 1.1em;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .button {
            display: inline-block;
            background-color: var(--purple);
            color: #fff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            margin: 5px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .button:hover {
            background-color: var(--purple-dark);
            transform: scale(1.05);
        }
        
        .secondary-button {
            background: rgba(255,255,255,0.15);
        }
        .secondary-button:hover {
             background: rgba(255,255,255,0.25);
        }

        /* --- UPDATED: Sticky Footer --- */
        footer {
            position: sticky;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--dark-gray);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 10px; /* Slimmer padding */
            z-index: 100;
            box-sizing: border-box;
        }
        
        .mobile-nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 102;
        }
        
        .mobile-nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 70%;
            max-width: 300px;
            height: 100vh;
            background: var(--dark-gray);
            z-index: 101;
            transition: transform 0.3s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
        }

        .mobile-nav.is-open {
            transform: translateX(-100%);
        }
        
        .nav-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .mobile-nav a {
            display: block;
            color: #fff;
            text-decoration: none;
            font-size: 1.5em;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* --- NEW: Map Pop-up (Modal) Styles --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--light-gray);
            padding: 20px;
            border-radius: 16px;
            position: relative;
            width: 90%;
            max-width: 900px;
        }

        .modal-close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .modal-content iframe {
            width: 100%;
            height: 70vh;
            border: 0;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .site-header {
                padding: 15px;
                justify-content: space-between;
            }

            .site-header .logo {
                max-height: 30px;
            }

            .site-header .header-buttons {
                display: none;
            }
            
            .mobile-nav-toggle {
                display: block;
            }

            .content-card {
                padding: 40px 25px;
            }

            .card-content h1 {
                font-size: 2.2em;
            }

            .card-content p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="https://raw.githubusercontent.com/ceelo404/ruby-salon/main/white_logo_vert.png" alt="Ruby Salon Logo" class="logo" loading="lazy">
        <div class="header-buttons">
             <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button secondary-button">Book Now</a>
             <a href="https://venmo.com/u/Brandy-Claussen" class="button">Tip Now</a>
        </div>
        <button class="mobile-nav-toggle" aria-label="Open navigation">
            <svg width="24" height="24" viewBox="0 0 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 6H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 18H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </header>

    <nav class="mobile-nav">
        <button class="nav-close-btn" aria-label="Close navigation">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/">Book Now</a>
        <a href="https://venmo.com/u/Brandy-Claussen">Tip Now</a>
        <a id="open-map-btn">Find Us</a>
    </nav>

    <main>
        <section class="hero-section">
            <div class="content-card">
                <div class="card-content">
                    <h1>Style, Perfected.</h1>
                    <p>Located at 114 W Trinity Pl. #10 in Downtown Decatur. Free validated parking for 2 hours is available in the AMLI parking garage.</p>
                    <p><strong>Phone:</strong> <a href="tel:+14043893114" style="color: #fff;">(404) 389-3114</a></p>
                    <div>
                         <a href="https://book.ruby-salon.com/cancellation-adjustments-policy/" class="button">Book An Appointment</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="map-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" aria-label="Close map">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18" stroke="#1b1b1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6L18 18" stroke="#1b1b1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3316.326774842101!2d-84.29828578479205!3d33.77792688068134!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88f5074f3b063d7b%3A0x33b8b9589d311912!2s114%20W%20Trinity%20Pl%20%2310%2C%20Decatur%2C%20GA%2030030%2C%20USA!5e0!3m2!1sen!2s!4v1663456789012!5m2!1sen!2s0" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>
    
    <footer style="display: none;">
        </footer>

    <footer>
        <p>© 2025 Ruby Salon</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Hamburger Menu constants
            const navToggle = document.querySelector('.mobile-nav-toggle');
            const navClose = document.querySelector('.nav-close-btn');
            const mobileNav = document.querySelector('.mobile-nav');

            // Map Modal constants
            const openMapBtn = document.getElementById('open-map-btn');
            const mapModal = document.getElementById('map-modal');
            const closeMapBtn = document.querySelector('.modal-close-btn');

            // Hamburger Menu functions
            function openNav() {
                mobileNav.classList.add('is-open');
            }
            function closeNav() {
                mobileNav.classList.remove('is-open');
            }

            navToggle.addEventListener('click', openNav);
            navClose.addEventListener('click', closeNav);

            // Map Modal functions
            function openMapModal() {
                mapModal.classList.add('is-visible');
            }
            function closeMapModal() {
                mapModal.classList.remove('is-visible');
            }

            openMapBtn.addEventListener('click', () => {
                closeNav(); // Close the nav menu first
                openMapModal(); // Then open the map
            });

            closeMapBtn.addEventListener('click', closeMapModal);
            
            // Close modals when clicking outside
            document.addEventListener('click', (event) => {
                // Close hamburger nav
                if (mobileNav.classList.contains('is-open') && !event.target.closest('.mobile-nav') && !event.target.closest('.mobile-nav-toggle')) {
                    closeNav();
                }
                // Close map modal
                if (event.target === mapModal) {
                    closeMapModal();
                }
            });
        });
    </script>

</body>
</html>
